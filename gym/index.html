<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub - Acortador de URLs</title>
    <meta name="theme-color" content="#667eea">
    <link rel="manifest" href="/desktop/manifest.json">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">Link Hub</h1>
                <p class="subtitle">Enlaces a los sitios mas usados</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Links Grid -->
            <section class="links-section">
                <h2>Links y Apps</h2>
                <div class="links-grid">
                    <!-- Calculadora para alimentación -->
                    <a href="#" class="link-button" onclick="abrirSheets('18KEgYkkZW5Q0Ujeal9olv1-PCSIsKR2D')">
                        <div class="button-icon">
                            <img src="/assets/images/excel.svg" alt="Moodle">
                        </div>
                        <div class="button-title">KCal-Culator</div>
                        <div class="button-description">Hoja de cálculo para alimentación</div>
                    </a>


                    <!-- Rutina de ejercicios -->
                    <a href="#" class="link-button"
                        onclick="abrirSheets('1XOR8t8mh8mhkRw7FudBKcddQicEKkFBMkIpWOm7YD4M')">
                        <div class="button-icon">
                            <img src="/assets/images/excel.svg" alt="Moodle">
                        </div>
                        <div class="button-title">Rutina Gym</div>
                        <div class="button-description">Hoja de cálculo para rutina de ejercicios</div>
                    </a>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 LinkHub - By Christian Herrera</p>
        </footer>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/assets/js/sw.js');
        }

        function abrirSheets(id) {
            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {// Intent → abre app
                window.location.href = "intent://docs.google.com/spreadsheets/d/" + id + "#Intent;scheme=https;package=com.google.android.apps.docs.editors.sheets;end";
            } else {// Link normal → PC / otros dispositivos
                window.location.href = "https://docs.google.com/spreadsheets/d/" + id;
            }
        }
    </script>
</body>

</html>
